    <!-- akhir secret tag center -->
    
    <!-- script buat infinite scorll laynard -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const laynard = document.querySelector(".laynard");

            
            const clone = laynard.innerHTML;
            laynard.innerHTML += clone;

        
            function checkScroll() {
                if (laynard.scrollLeft >= laynard.scrollWidth / 2) {
                    laynard.scrollLeft = 0;
                }
                requestAnimationFrame(checkScroll);
            }

            checkScroll();
        });
    </script>
    <!-- akhir script buat infinite scorll laynard -->
